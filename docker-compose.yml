services:
 minio:
   image: minio/minio
   ports:
     - 9001:9001
   volumes:
     - minio_storage:/data
   environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: NotSoSecret
   command: server --console-address ":9001" /data

  
  

 libra:
   image: crdeveloppement/libra:v.0.0.3
   pull_policy: never
   ports: 
     - 8080:8080
   environment:
     LIBRA_STORE_DSN: s3://minio:NotSoSecret@minio:9000/libra
volumes:
  minio_storage: