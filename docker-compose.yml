services:
 minio:
   image: minio/minio
   ports:
     - 9001:9001
   volumes:
     - minio_storage:/data
   environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: NotSoSecret
   command: server --console-address ":9001" /data

  
  

 libra:
   image: ghcr.io/bornholm/libra:0.0.3
   
   ports: 
     - 8080:8080
   environment:
     LIBRA_STORE_DSN: s3://minio:NotSoSecret@minio:9000/libra
   deploy:
    replicas: 3
    update_config:
      parallelism: 1
      delay: 5s 

volumes:
  minio_storage: